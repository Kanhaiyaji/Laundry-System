<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laundry Order Management System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
      text-align: center;
    }

    header h1 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    header p {
      color: #666;
      font-size: 1.1em;
    }

    .nav-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav-tab {
      background: white;
      border: 2px solid #667eea;
      color: #667eea;
      padding: 12px 24px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .nav-tab:hover {
      background: #667eea;
      color: white;
      transform: translateY(-2px);
    }

    .nav-tab.active {
      background: #667eea;
      color: white;
    }

    .tab-content {
      display: none;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.3s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 1em;
      font-family: inherit;
      transition: border-color 0.3s ease;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.2);
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
    }

    .btn-success {
      background: #48bb78;
      color: white;
    }

    .btn-success:hover {
      background: #38a169;
    }

    .btn-warning {
      background: #f6ad55;
      color: white;
    }

    .btn-warning:hover {
      background: #ed8936;
    }

    .btn-danger {
      background: #f56565;
      color: white;
    }

    .btn-danger:hover {
      background: #e53e3e;
    }

    .garment-item {
      background: #f7fafc;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 15px;
      border-left: 4px solid #667eea;
    }

    .garment-item button {
      background: #f56565;
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.9em;
      margin-top: 10px;
    }

    .garment-item button:hover {
      background: #e53e3e;
    }

    .order-card {
      background: #f7fafc;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 5px solid #667eea;
      transition: all 0.3s ease;
    }

    .order-card:hover {
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
      transform: translateX(5px);
    }

    .order-card h3 {
      color: #667eea;
      margin-bottom: 10px;
    }

    .order-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
      font-size: 0.95em;
    }

    .order-info div {
      color: #555;
    }

    .order-info strong {
      color: #333;
    }

    .status-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9em;
      font-weight: 600;
      margin: 10px 0;
    }

    .status-received {
      background: #bee3f8;
      color: #2c5282;
    }

    .status-processing {
      background: #fed7d7;
      color: #742a2a;
    }

    .status-ready {
      background: #c6f6d5;
      color: #22543d;
    }

    .status-delivered {
      background: #c2e9f0;
      color: #1a365d;
    }

    .garment-list {
      margin: 10px 0;
      padding-left: 20px;
    }

    .garment-list li {
      color: #555;
      margin-bottom: 5px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .dashboard-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .dashboard-card h3 {
      font-size: 0.9em;
      opacity: 0.9;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .dashboard-card .value {
      font-size: 2.5em;
      font-weight: bold;
    }

    .status-count {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }

    .status-count-item {
      background: #f7fafc;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      border-top: 4px solid #667eea;
    }

    .status-count-item h4 {
      color: #667eea;
      margin-bottom: 10px;
    }

    .status-count-item .count {
      font-size: 2em;
      font-weight: bold;
      color: #333;
    }

    .filter-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .alert {
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert-success {
      background: #c6f6d5;
      color: #22543d;
      border-left: 4px solid #48bb78;
    }

    .alert-error {
      background: #fed7d7;
      color: #742a2a;
      border-left: 4px solid #f56565;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #667eea;
      font-weight: 600;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 3em;
      margin-bottom: 15px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8em;
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }

      .order-info {
        grid-template-columns: 1fr;
      }

      .nav-tabs {
        justify-content: flex-start;
        overflow-x: auto;
      }
    }

    .section-title {
      font-size: 1.5em;
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🧺 Laundry Order Management</h1>
      <p>Modern & Simple Order Management System</p>
    </header>

    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="create-order">Create Order</button>
      <button class="nav-tab" data-tab="view-orders">View Orders</button>
      <button class="nav-tab" data-tab="filter-orders">Filter Orders</button>
      <button class="nav-tab" data-tab="update-status">Update Status</button>
      <button class="nav-tab" data-tab="dashboard">Dashboard</button>
    </div>

    <!-- Create Order Tab -->
    <div id="create-order" class="tab-content active">
      <h2 class="section-title">Create New Order</h2>
      <div id="createOrderAlert"></div>
      <form id="createOrderForm">
        <div class="grid-2">
          <div class="form-group">
            <label for="customerName">Customer Name *</label>
            <input type="text" id="customerName" name="customerName" required>
          </div>
          <div class="form-group">
            <label for="phoneNumber">Phone Number *</label>
            <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="555-123-4567" required>
          </div>
        </div>

        <h3 style="margin-top: 20px; margin-bottom: 15px; color: #333;">Garments</h3>
        <div id="garmentsList"></div>
        <button type="button" class="btn btn-primary" onclick="addGarmentField()">+ Add Garment</button>

        <div style="margin-top: 20px;">
          <button type="submit" class="btn btn-success" style="width: 100%;">Create Order</button>
        </div>
      </form>
    </div>

    <!-- View Orders Tab -->
    <div id="view-orders" class="tab-content">
      <h2 class="section-title">All Orders</h2>
      <div id="viewOrdersAlert"></div>
      <button class="btn btn-primary" onclick="loadAllOrders()">Refresh Orders</button>
      <div id="allOrdersList" style="margin-top: 20px;"></div>
    </div>

    <!-- Filter Orders Tab -->
    <div id="filter-orders" class="tab-content">
      <h2 class="section-title">Filter Orders</h2>
      <div id="filterAlert"></div>
      <div class="filter-group">
        <div class="form-group">
          <label for="filterStatus">Filter by Status</label>
          <select id="filterStatus" onchange="applyFilters()">
            <option value="">All Status</option>
            <option value="RECEIVED">RECEIVED</option>
            <option value="PROCESSING">PROCESSING</option>
            <option value="READY">READY</option>
            <option value="DELIVERED">DELIVERED</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filterCustomerName">Filter by Customer Name</label>
          <input type="text" id="filterCustomerName" placeholder="Enter customer name" onchange="applyFilters()">
        </div>
        <div class="form-group">
          <label for="filterPhone">Filter by Phone</label>
          <input type="tel" id="filterPhone" placeholder="Enter phone number" onchange="applyFilters()">
        </div>
      </div>
      <div id="filteredOrdersList"></div>
    </div>

    <!-- Update Status Tab -->
    <div id="update-status" class="tab-content">
      <h2 class="section-title">Update Order Status</h2>
      <div id="updateStatusAlert"></div>
      <form id="updateStatusForm">
        <div class="grid-2">
          <div class="form-group">
            <label for="orderIdToUpdate">Order ID *</label>
            <input type="text" id="orderIdToUpdate" placeholder="e.g., ORD-1001" required>
          </div>
          <div class="form-group">
            <label for="newStatus">New Status *</label>
            <select id="newStatus" required>
              <option value="">Select Status</option>
              <option value="RECEIVED">RECEIVED</option>
              <option value="PROCESSING">PROCESSING</option>
              <option value="READY">READY</option>
              <option value="DELIVERED">DELIVERED</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-warning" style="width: 100%;">Update Status</button>
      </form>
    </div>

    <!-- Dashboard Tab -->
    <div id="dashboard" class="tab-content">
      <h2 class="section-title">Admin Dashboard</h2>
      <div id="dashboardAlert"></div>
      <button class="btn btn-primary" onclick="loadDashboard()">Refresh Dashboard</button>
      <div id="dashboardContent" style="margin-top: 20px;"></div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000';
    let garmentCount = 1;

    // Tab Navigation
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        const tabName = this.getAttribute('data-tab');
        showTab(tabName);
      });
    });

    function showTab(tabName) {
      // Hide all tabs
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });

      // Remove active class from all nav tabs
      document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.classList.remove('active');
      });

      // Show selected tab
      document.getElementById(tabName).classList.add('active');

      // Add active class to clicked nav tab
      document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');

      // Load data for certain tabs
      if (tabName === 'view-orders') {
        loadAllOrders();
      } else if (tabName === 'dashboard') {
        loadDashboard();
      }
    }

    // Add Garment Field
    function addGarmentField() {
      garmentCount++;
      const garmentsList = document.getElementById('garmentsList');
      const garmentHtml = `
        <div class="garment-item" id="garment-${garmentCount}">
          <div class="form-group">
            <label>Garment Type</label>
            <input type="text" class="garmentType" placeholder="e.g., Shirt, Trousers" required>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="form-group">
              <label>Quantity</label>
              <input type="number" class="garmentQuantity" min="1" required>
            </div>
            <div class="form-group">
              <label>Price</label>
              <input type="number" class="garmentPrice" step="0.01" min="0" required>
            </div>
          </div>
          <button type="button" class="btn btn-danger" onclick="removeGarment(${garmentCount})">Remove</button>
        </div>
      `;
      garmentsList.insertAdjacentHTML('beforeend', garmentHtml);
    }

    function removeGarment(id) {
      const garmentDiv = document.getElementById(`garment-${id}`);
      if (garmentDiv) {
        garmentDiv.remove();
      }
    }

    // Initialize first garment field
    document.addEventListener('DOMContentLoaded', function() {
      addGarmentField();
    });

    // Create Order
    document.getElementById('createOrderForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const customerName = document.getElementById('customerName').value;
      const phoneNumber = document.getElementById('phoneNumber').value;

      const garments = [];
      document.querySelectorAll('.garment-item').forEach(item => {
        const type = item.querySelector('.garmentType').value;
        const quantity = parseInt(item.querySelector('.garmentQuantity').value);
        const price = parseFloat(item.querySelector('.garmentPrice').value);

        if (type && quantity && price >= 0) {
          garments.push({ type, quantity, price });
        }
      });

      if (garments.length === 0) {
        showAlert('createOrderAlert', 'Please add at least one garment', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/api/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ customerName, phoneNumber, garments })
        });

        const data = await response.json();

        if (data.success) {
          showAlert('createOrderAlert', `Order ${data.data.orderId} created successfully!`, 'success');
          document.getElementById('createOrderForm').reset();
          garmentCount = 1;
          document.getElementById('garmentsList').innerHTML = '';
          addGarmentField();
        } else {
          showAlert('createOrderAlert', data.errors.join(', '), 'error');
        }
      } catch (error) {
        showAlert('createOrderAlert', 'Failed to create order: ' + error.message, 'error');
      }
    });

    // Load All Orders
    async function loadAllOrders() {
      try {
        showLoading('allOrdersList');
        const response = await fetch(`${API_URL}/api/orders`);
        const data = await response.json();

        if (data.success) {
          if (data.data.length === 0) {
            document.getElementById('allOrdersList').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><p>No orders found</p></div>';
          } else {
            document.getElementById('allOrdersList').innerHTML = data.data.map(order => renderOrder(order)).join('');
          }
        }
      } catch (error) {
        showAlert('viewOrdersAlert', 'Failed to load orders: ' + error.message, 'error');
      }
    }

    // Apply Filters
    async function applyFilters() {
      const status = document.getElementById('filterStatus').value;
      const customerName = document.getElementById('filterCustomerName').value;
      const phoneNumber = document.getElementById('filterPhone').value;

      let url = `${API_URL}/api/orders?`;
      if (status) url += `status=${status}&`;
      if (customerName) url += `customerName=${customerName}&`;
      if (phoneNumber) url += `phoneNumber=${phoneNumber}&`;

      url = url.slice(0, -1); // Remove trailing &

      try {
        showLoading('filteredOrdersList');
        const response = await fetch(url);
        const data = await response.json();

        if (data.success) {
          if (data.data.length === 0) {
            document.getElementById('filteredOrdersList').innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No orders match the filters</p></div>';
          } else {
            document.getElementById('filteredOrdersList').innerHTML = data.data.map(order => renderOrder(order)).join('');
          }
        }
      } catch (error) {
        showAlert('filterAlert', 'Failed to filter orders: ' + error.message, 'error');
      }
    }

    // Update Status
    document.getElementById('updateStatusForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const orderId = document.getElementById('orderIdToUpdate').value;
      const status = document.getElementById('newStatus').value;

      try {
        const response = await fetch(`${API_URL}/api/orders/${orderId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });

        const data = await response.json();

        if (data.success) {
          showAlert('updateStatusAlert', `Order ${orderId} status updated to ${status}!`, 'success');
          document.getElementById('updateStatusForm').reset();
        } else {
          showAlert('updateStatusAlert', data.message || 'Failed to update status', 'error');
        }
      } catch (error) {
        showAlert('updateStatusAlert', 'Failed to update status: ' + error.message, 'error');
      }
    });

    // Load Dashboard
    async function loadDashboard() {
      try {
        showLoading('dashboardContent');
        const response = await fetch(`${API_URL}/admin/dashboard`);
        const data = await response.json();

        if (data.success) {
          const dashboard = data.data;
          const dashboardHtml = `
            <div class="dashboard-grid">
              <div class="dashboard-card">
                <h3>Total Orders</h3>
                <div class="value">${dashboard.totalOrders}</div>
              </div>
              <div class="dashboard-card">
                <h3>Total Revenue</h3>
                <div class="value">$${dashboard.totalRevenue}</div>
              </div>
            </div>

            <h3 style="margin: 30px 0 15px; color: #333;">Orders by Status</h3>
            <div class="status-count">
              <div class="status-count-item">
                <h4>RECEIVED</h4>
                <div class="count">${dashboard.ordersByStatus.RECEIVED}</div>
              </div>
              <div class="status-count-item">
                <h4>PROCESSING</h4>
                <div class="count">${dashboard.ordersByStatus.PROCESSING}</div>
              </div>
              <div class="status-count-item">
                <h4>READY</h4>
                <div class="count">${dashboard.ordersByStatus.READY}</div>
              </div>
              <div class="status-count-item">
                <h4>DELIVERED</h4>
                <div class="count">${dashboard.ordersByStatus.DELIVERED}</div>
              </div>
            </div>

            <h3 style="margin: 30px 0 15px; color: #333;">Recent Orders</h3>
            ${dashboard.orders.length === 0 ? '<div class="empty-state"><p>No orders yet</p></div>' : dashboard.orders.slice(0, 5).map(order => renderOrder(order)).join('')}
          `;
          document.getElementById('dashboardContent').innerHTML = dashboardHtml;
        }
      } catch (error) {
        showAlert('dashboardAlert', 'Failed to load dashboard: ' + error.message, 'error');
      }
    }

    // Utility Functions
    function renderOrder(order) {
      const statusClass = `status-${order.status.toLowerCase()}`;
      return `
        <div class="order-card">
          <h3>${order.orderId}</h3>
          <span class="status-badge ${statusClass}">${order.status}</span>
          <div class="order-info">
            <div><strong>Customer:</strong> ${order.customerName}</div>
            <div><strong>Phone:</strong> ${order.phoneNumber}</div>
            <div><strong>Total Bill:</strong> $${order.totalBill.toFixed(2)}</div>
            <div><strong>Created:</strong> ${new Date(order.createdAt).toLocaleDateString()}</div>
          </div>
          <div>
            <strong>Garments:</strong>
            <ul class="garment-list">
              ${order.garments.map(g => `<li>${g.quantity}x ${g.type} @ $${g.price.toFixed(2)} each</li>`).join('')}
            </ul>
          </div>
        </div>
      `;
    }

    function showAlert(elementId, message, type) {
      const alertDiv = document.getElementById(elementId);
      alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
      setTimeout(() => {
        alertDiv.innerHTML = '';
      }, 5000);
    }

    function showLoading(elementId) {
      document.getElementById(elementId).innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
    }
  </script>
</body>
</html>
